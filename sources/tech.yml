# 구독 소스 목록 — 항목을 추가/삭제하면 다음 실행부터 반영됩니다.
#
# type: github-release  → repo: owner/repo  (GitHub Releases 감시)
# type: rss             → url: 피드 주소     (블로그/뉴스의 RSS·Atom)
# channel: (선택) Slack 웹훅 라우팅 키.
#   예) channel: ai-news → SLACK_WEBHOOK_AI_NEWS 시크릿의 웹훅으로 전송.
#   해당 시크릿이 없으면 SLACK_WEBHOOK_URL로 폴백됩니다.

sources:
  # ── 기술 스택 릴리스 ──────────────────────────────
  - name: TypeScript
    type: github-release
    repo: microsoft/TypeScript

  - name: React
    type: github-release
    repo: facebook/react

  - name: Node.js
    type: github-release
    repo: nodejs/node

  - name: Vite
    type: github-release
    repo: vitejs/vite

  # ── UI / 상태 관리 ───────────────────────────────
  - name: MUI (Material UI)
    type: github-release
    repo: mui/material-ui

  - name: MUI X
    type: github-release
    repo: mui/mui-x

  - name: TanStack Query
    type: github-release
    repo: TanStack/query

  - name: Zustand
    type: github-release
    repo: pmndrs/zustand

  - name: Jotai
    type: github-release
    repo: pmndrs/jotai

  - name: React Router
    type: github-release
    repo: remix-run/react-router

  - name: React Hook Form
    type: github-release
    repo: react-hook-form/react-hook-form

  - name: Zod
    type: github-release
    repo: colinhacks/zod

  # ── 도구 / 테스트 / 모니터링 ─────────────────────
  - name: Biome
    type: github-release
    repo: biomejs/biome

  - name: Vitest
    type: github-release
    repo: vitest-dev/vitest

  - name: Playwright
    type: github-release
    repo: microsoft/playwright

  - name: Sentry JS SDK
    type: github-release
    repo: getsentry/sentry-javascript

  # ── AI 소식 ──────────────────────────────────────
  - name: OpenAI News
    type: rss
    url: https://openai.com/news/rss.xml
    channel: ai-news

  - name: Google DeepMind Blog
    type: rss
    url: https://deepmind.google/blog/rss.xml
    channel: ai-news

  # Anthropic 뉴스는 공식 RSS가 없어 아직 미지원.
  # 추후 HTML 페이지 감시 방식의 fetcher를 추가하면 구독 가능.
